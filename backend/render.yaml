# FuelRadar Backend - render.yaml
# Render Blueprint for automatic deployment
# https://render.com/docs/blueprint-spec

services:
  # Main API Service
  - type: web
    name: fuelradar-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt  # EU region for German users
    plan: starter  # or "standard" for production
    healthCheckPath: /api/health
    envVars:
      - key: TANKERKOENIG_API_KEY
        sync: false  # Will be set manually
      - key: DATABASE_URL
        fromDatabase:
          name: fuelradar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fuelradar-redis
          property: connectionString
      - key: ALERT_CHECK_MINUTES
        value: "5"
      - key: CACHE_TTL_SECONDS
        value: "60"
      - key: DEBUG
        value: "false"

databases:
  # PostgreSQL Database
  - name: fuelradar-db
    databaseName: fuelradar
    region: frankfurt
    plan: starter  # or "standard" for production
    postgresMajorVersion: "16"

# Redis for caching (Render Redis)
redis:
  - name: fuelradar-redis
    region: frankfurt
    plan: starter  # 25MB free, upgrade for production
    maxmemoryPolicy: allkeys-lru
